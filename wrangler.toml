name = "cloudflare-virtual-girlfriend6"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Serve static files from public directory (landing.html as index)
[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "auto-trailing-slash"

[[d1_databases]]
binding = "DB"
database_name = "virtual-girlfriend"
database_id = "1883e31a-b1b6-4334-91c4-97540e284070"

[ai]
binding = "AI"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1
